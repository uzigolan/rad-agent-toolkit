# Datasheet -> family/product map (single source for scripts/ingest_datasheet.py).
# Classification comes from each PDF's own first-page banner ("Data Sheet |
# <family> | <product> | ..."), verified by scripts scan on 2026-07-20 — not
# from filenames. kind: system = standalone device datasheet; card = plug-in
# module for a chassis family; accessory = non-traffic hardware.
# family: null = real product with no inventory family (still ingested and
# searchable by product). Set skip: true on any entry to exclude it.
provenance: first-page text of each PDF under rad-mcp-server/datasheets/
