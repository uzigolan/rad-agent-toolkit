name: SNMP Support Coverage

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  snmp-support-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install server dependencies
        run: python -m pip install -e ./server

      - name: Verify SNMP support coverage
        run: python ./scripts/check_snmp_support_coverage.py
