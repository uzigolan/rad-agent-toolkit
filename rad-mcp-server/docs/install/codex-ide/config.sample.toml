# Append ONE of these to ~/.codex/config.toml (absolute paths - TOML does
# not expand $HOME or ~). Linux venv: .venv/bin/python; Windows: .venv/Scripts/python.exe

# stdio - Codex launches its own instance (full toolset incl. staged writes)
[mcp_servers.rad-mcp]
command = "<repo>/rad-mcp-server/server/.venv/bin/python"
args = ["-m", "rad_mcp.server"]
cwd = "<repo>/rad-mcp-server/server"
env = { RAD_MCP_INVENTORY = "<repo>/rad-mcp-server/inventory.yaml" }
startup_timeout_sec = 20

# http client - server runs manually, read-only (rename to [mcp_servers.rad-mcp]
# and remove the stdio one, or keep both with enabled = false on one)
[mcp_servers.rad-mcp-shared]
enabled = false
url = "https://<host>:8080/mcp"
http_headers = { Authorization = "Bearer <your-token>" }
